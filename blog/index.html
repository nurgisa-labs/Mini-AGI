          const saved = window.localStorage.getItem('miniagi-theme');

<script>
      (() => {
        const key = 'miniagi-theme';
        const root = document.documentElement;
        const meta = document.querySelector('meta[name="theme-color"]');
        const fallbackLabels = { light: 'светлый режим', dark: 'тёмный режим' };

        function currentTheme() {
          return root.dataset.theme === 'light' ? 'light' : 'dark';
        }

        function syncControls() {
          const theme = currentTheme();
          document.querySelectorAll('[data-theme-toggle]').forEach((control) => {
            const label = theme === 'light'
              ? control.getAttribute('data-theme-dark-label') || fallbackLabels.dark
              : control.getAttribute('data-theme-light-label') || fallbackLabels.light;
            // The accessible name (aria-label with both modes) stays constant;
            // only the visible hint and the pressed state (light engaged) change.
            control.textContent = label;
            control.setAttribute('aria-pressed', theme === 'light' ? 'true' : 'false');
          });
        }

        function setTheme(theme) {
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
          if (meta) meta.setAttribute('content', theme === 'light' ? '#f8fafc' : '#050706');
          try { window.localStorage.setItem(key, theme); } catch {}
          syncControls();
        }

        document.addEventListener('click', (event) => {
          const target = event.target instanceof Element ? event.target.closest('[data-theme-toggle]') : null;
          if (!target) return;
          setTheme(currentTheme() === 'light' ? 'dark' : 'light');
        });

        syncControls();
      })();
    </script><script>
      (() => {
        const root = document.documentElement;
        const items = Array.from(document.querySelectorAll('[data-scroll-reveal]'));
        if (!items.length) return;

        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        root.classList.add(reduce ? 'reveal-reduced' : 'reveal-ready');

        if (reduce || !('IntersectionObserver' in window)) {
          items.forEach((item) => item.classList.add('is-visible'));
          return;
        }

        items[0]?.classList.add('is-visible');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          });
        }, { rootMargin: '0px 0px -12% 0px', threshold: 0.18 });

        items.forEach((item, index) => {
          item.style.setProperty('--reveal-delay', `${Math.min(index * 70, 220)}ms`);
          if (!item.classList.contains('is-visible')) observer.observe(item);
        });
      })();
    </script></body></html>
